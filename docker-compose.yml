services:
  web_app:
    build:
      context: .
    container_name: fastapi_app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db
    environment:
      ASYNC_DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/mydatabase
      SYNC_DATABASE_URL: postgresql+psycopg2://postgres:password@db:5432/mydatabase
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app

  db:
    image: postgres:16
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db